<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Galaxy</title>
    <link rel="icon" type="image/png" href="./images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/main.css">
</head>

<body >
    <div class="game bg">
        <div id="info_bar" class="menu_bar mx_auto d-flex">
        <div id="score" class="header-item">Score: 0</div>
        <div id="high_score" class="header-item hide">High Score: 100</div>
        <div id="menu_link" class="header-item">Menu</div>
    </div>
    <h1 id="game_title">Math Galaxy</h1>

    <div id="menu" class="menu mx-auto d-flex flex-column">
        <button class="menu_button menu-item mode" value="+">Addition</button>
        <button class="menu_button menu-item mode" value="-">Subtraction</button>
        <button class="menu_button menu-item mode" value="x">Multiplication</button>
        <button class="menu_button menu-item" id="settings_button">Settings</button>

    </div>
    <div class="backdrop hide" id="play_area">
        <div class="problem-container">

            <div class="problem">
                <div id="top" class="top_number">3</div>

                <div class="bottom_row">
                    <div id="operator" class="operator">+</div>
                    <div id="bottom" class="bottom_number">10</div>
                </div>

                <div class="line"></div>
            </div>
        </div>
        <div class="answer_input mx-auto d-flex">
            <input id="user_input" type="number" step="1" autocomplete="off" class="ghost-input">
        </div>
    </div>

    <div class="settings menu mx-auto d-flex flex-column hide" id="settings">
            <div class="selection menu-item">
                <label for="level">Level: </label>
                <select name="level" id="level">
                    <option value=10> 0-9</option>
                    <option value=13>0-12</option>
                </select>
            </div>
            <div class="selection menu-item">
                <label for="spec_num">Specific Number: </label>
                <select name="spec_num" id="spec_num">
                    <option value="any">any</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select>
            </div>
            <button class="menu_button menu-item" id="reset">Reset High Scores</button>
            <button class="menu_button menu-item" id="back_button">&larr; Back</button>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/main.js"></script>
</body>

</html>
